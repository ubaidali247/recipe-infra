name: CD - Deploy to AKS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
  workflow_run:
    workflows: ["Frontend CI", "Backend CI"]
    types:
      - completed
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group recipe-app-rg \
            --name recipe-aks \
            --overwrite-existing

      - name: Deploy blue environment
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/mongo.yml
          kubectl apply -f k8s/backend-blue.yml
          kubectl apply -f k8s/frontend-blue.yml

      - name: Wait for blue deployment
        run: |
          kubectl rollout status deployment/recipe-backend-blue -n recipe-app --timeout=120s
          kubectl rollout status deployment/recipe-frontend-blue -n recipe-app --timeout=120s

      - name: Switch traffic to blue
        run: |
          kubectl apply -f k8s/services.yml

      - name: Verify deployment health
        run: |
          kubectl get pods -n recipe-app
          kubectl get services -n recipe-app