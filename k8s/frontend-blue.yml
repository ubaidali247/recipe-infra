apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-frontend-blue
  namespace: recipe-app
  labels:
    app: recipe-frontend
    slot: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recipe-frontend
      slot: blue
  template:
    metadata:
      labels:
        app: recipe-frontend
        slot: blue
    spec:
      containers:
        - name: frontend
          image: recipeacr247.azurecr.io/recipe-frontend:latest
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - containerPort: 22137